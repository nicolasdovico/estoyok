
services:
  # Servidor Web Nginx para el Backend
  nginx:
    image: nginx:alpine
    container_name: estoyok-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - estoyok-network

  # PHP-FPM para Laravel
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: estoyok-backend
    volumes:
      - ./backend:/var/www/html
    networks:
      - estoyok-network
    depends_on:
      - postgres
      - redis

  # Base de Datos Geoespacial
  postgres:
    image: postgis/postgis:16-3.4
    container_name: estoyok-postgres
    environment:
      POSTGRES_DB: estoyok_db
      POSTGRES_USER: estoyok_user
      POSTGRES_PASSWORD: estoyok_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - estoyok-network

  # Cache y Colas de Laravel
  redis:
    image: redis:alpine
    container_name: estoyok-redis
    ports:
      - "6379:6379"
    networks:
      - estoyok-network

networks:
  estoyok-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
